services:
  - type: web
    name: curalink-api
    runtime: node
    rootDir: .
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: PORT
        value: 4000
      - key: HF_API_BASE_URL
        value: https://api-inference.huggingface.co
      - key: HF_CHAT_BASE_URL
        value: https://router.huggingface.co/v1
      - key: HF_TEXT_MODEL
        value: mistralai/Mistral-7B-Instruct-v0.3
      - key: HF_EMBEDDING_MODEL
        value: sentence-transformers/all-MiniLM-L6-v2
      - key: MONGODB_URI
        sync: false
      - key: HF_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
